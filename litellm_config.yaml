# ── Model Definitions ──────────────────────────────────────
model_list:

  - model_name: glm-5
    litellm_params:
      model: zai/glm-5
      api_key: os.environ/ZAI_API_KEY
      base_url: https://api.z.ai/api/paas/v4/
      extra_body:
        thinking:
          type: enabled


  # ── Google Gemini (Gen 3.1) ───────────────────────────
  - model_name: gemini-3-pro-preview
    litellm_params:
      model: gemini/gemini-3-pro-preview
      api_key: os.environ/GOOGLE_API_KEY

  - model_name: Gemini 3.1 Flash-Lite Preview
    litellm_params:
      model: gemini/gemini-3.1-flash-lite-preview
      api_key: os.environ/GOOGLE_API_KEY


  # ── OpenAI (GPT-5 Garlic Series) ──────────────────────
  - model_name: gpt-5.3-garlic
    litellm_params:
      model: openai/gpt-5.3-garlic
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.2
    litellm_params:
      model: openai/gpt-5.2
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-oss-120b
    litellm_params:
      model: openai/gpt-oss-120b
      api_key: os.environ/OPENAI_API_KEY

  # ── Anthropic (Claude 4.6 Series) ──────────────────────
  - model_name: claude-opus-4.6
    litellm_params:
      model: anthropic/claude-4.6-opus
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4.6
    litellm_params:
      model: anthropic/claude-4.6-sonnet
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── DeepSeek (V4 Series) ──────────────────────────────
  - model_name: deepseek-v4
    litellm_params:
      model: deepseek/deepseek-v4
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: deepseek-v4-lite
    litellm_params:
      model: deepseek/deepseek-v4-lite
      api_key: os.environ/DEEPSEEK_API_KEY

  # ── xAI Grok (4.20 Parallel Agents) ───────────────────
  - model_name: grok-4.20
    litellm_params:
      model: xai/grok-4.20
      api_key: os.environ/GROK_API_KEY

  # ── Docker Model Runner (Local LLMs) ───────────────────────
  # Requires: docker desktop enable model-runner --tcp 12434
  # Then: docker model pull ai/llama3.2
  - model_name: embeddinggemma
    litellm_params:
      model: docker.io/ai/embeddinggemma:latest
      api_base: http://host.docker.internal:12434/v1
      api_key: "not-needed"

  - model_name: ministral3
    litellm_params:
      model: docker.io/ai/ministral3:latest
      api_base: http://host.docker.internal:12434/v1
      api_key: "not-needed"

# ── Router Settings ────────────────────────────────────────
router_settings:
  routing_strategy: latency-based-routing
  num_retries: 3
  retry_after: 5
  timeout: 120
  allowed_fails: 3
  cooldown_time: 60
  enable_pre_call_checks: true

  # Fallback chains (local models as ultimate fallbacks)
  fallbacks:
    - gpt-5.3-garlic: [claude-opus-4.6, deepseek-v4, ministral3]
    - claude-opus-4.6: [gpt-5.3-garlic, gemini-3.1-pro, ministral3]
    - gemini-3.1-pro: [deepseek-v4, gpt-5.2, ministral3]
    - deepseek-v4: [local-deepseek-r1, ministral3]

# ── General Settings ───────────────────────────────────────
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL
  store_model_in_db: true
  enable_mcp_server: true                    # 👈 Enables the LiteLLM MCP Server
  enable_tool_registry: true                 # 👈 Allows tools to be exposed via MCP

litellm_settings:
  drop_params: true
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    ttl: 300
