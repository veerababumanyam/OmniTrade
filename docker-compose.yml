version: '3.8'

services:
  database:
    image: ankane/pgvector:v0.5.1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omnitrade
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/internal/database/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./backend/internal/database/rag_schema.sql:/docker-entrypoint-initdb.d/2_rag_schema.sql
      - ./backend/internal/database/fmp_schema.sql:/docker-entrypoint-initdb.d/3_fmp_schema.sql
      - ./backend/internal/database/news_schema.sql:/docker-entrypoint-initdb.d/4_news_schema.sql
      - ./backend/internal/database/0_init_litellm_db.sql:/docker-entrypoint-initdb.d/0_init_litellm_db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    environment:
      - REDIS_ARGS=--appendonly yes
    volumes:
      - redis_data:/data

  # ── LiteLLM AI Gateway (MIT License) ──────────────────
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-omnitrade-master-key}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-sk-omnitrade-salt-key}
      LITELLM_DATABASE_URL: postgresql://postgres:postgres@database:5432/litellm
      STORE_MODEL_IN_DB: "True"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_BEARER_TOKEN: "Bearer ${ZAI_API_KEY:-}"
      FMP_API_KEY: ${FMP_API_KEY:-}
      FMP_MCP_URL: "https://financialmodelingprep.com/mcp?apikey=${FMP_API_KEY:-}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://postgres:postgres@database:5432/litellm
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── PostgreSQL pgvector Connector (litellm-pgvector) ──
  pgvector-connector:
    build:
      context: ./tools/litellm-pgvector
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
      litellm:
        condition: service_healthy
    ports:
      - "5001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@database:5432/omnitrade?schema=public
      SERVER_API_KEY: ${LITELLM_MASTER_KEY:-sk-omnitrade-master-key}
      HOST: "0.0.0.0"
      PORT: "8000"
      # Embedding config — uses LiteLLM proxy for embeddings
      EMBEDDING__MODEL: text-embedding-004
      EMBEDDING__BASE_URL: http://litellm:4000
      EMBEDDING__API_KEY: ${LITELLM_MASTER_KEY:-sk-omnitrade-master-key}
      EMBEDDING__DIMENSIONS: "768"
    restart: always

  # ── Phoenix LLM Observability ────────────────────────
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006" # UI
      - "4317:4317" # OTLP gRPC for ADK traces
      - "4318:4318" # OTLP HTTP
    environment:
      - PHOENIX_HOST=0.0.0.0

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-omnitrade2026}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ── ML Microservice: Tabular (Fast Brain) ────────────────────
  ml-inference-tabular:
    build:
      context: ./ml-inference-tabular
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@database:5432/omnitrade"
      REDIS_URL: "redis://redis:6379"
    restart: always

  # ── ML Microservice: Deep Learning (Slow Brain) ───────────────────
  ml-inference-deep:
    build:
      context: ./ml-inference-deep
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@database:5432/omnitrade"
      REDIS_URL: "redis://redis:6379"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: always

volumes:
  postgres_data:
  redis_data:
  minio_data:
