<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniTrade 2026 - Polymorphic Trading Card</title>
    <style>
        :root {
            --ot-bg: hsl(230, 20%, 5%);
            --ot-card-bg: rgba(255, 255, 255, 0.05);
            --ot-primary-text: hsl(0, 0%, 98%);
            --ot-secondary-text: hsl(230, 10%, 75%);
            --ot-brand-green: hsl(140, 70%, 50%);
            --ot-brand-red: hsl(350, 75%, 55%);
            --ot-brand-blue: hsl(210, 100%, 55%);
            --ot-spring: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--ot-bg);
            color: var(--ot-primary-text);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            perspective: 1000px;
        }

        .trading-card {
            --state: 'minimal';
            width: 320px;
            background: var(--ot-card-bg);
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            transform-style: preserve-3d;
            transform: translateZ(12px);
            transition: all var(--ot-spring);
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.4),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        .trading-card:hover {
            transform: translateZ(24px) scale(1.02);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        /* Polymorphic States */
        .trading-card[data-state="minimal"] .expanded-content,
        .trading-card[data-state="minimal"] .decision-volume {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
        }

        .trading-card[data-state="expanded"] .expanded-content {
            opacity: 1;
            max-height: 300px;
            margin-top: 16px;
        }

        .trading-card[data-state="decision"] .decision-volume {
            opacity: 1;
            max-height: 200px;
            margin-top: 16px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .asset-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .asset-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--ot-brand-blue), #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .asset-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .asset-symbol {
            color: var(--ot-secondary-text);
            font-size: 0.85rem;
        }

        .price-display {
            text-align: right;
        }

        .price {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .price-change {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .price-change.positive { color: var(--ot-brand-green); }
        .price-change.negative { color: var(--ot-brand-red); }

        /* Expanded Content - Charts and Data */
        .expanded-content {
            transition: all var(--ot-spring);
        }

        .mini-chart {
            height: 80px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-end;
            padding: 8px;
            gap: 4px;
        }

        .chart-bar {
            flex: 1;
            background: var(--ot-brand-blue);
            border-radius: 2px;
            opacity: 0.6;
            transition: all 0.2s ease;
        }

        .chart-bar:hover {
            opacity: 1;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .metric {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        .metric-value {
            font-size: 1rem;
            font-weight: 600;
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--ot-secondary-text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Decision Volume - Trade Action */
        .decision-volume {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 16px;
            transition: all var(--ot-spring);
        }

        .ai-recommendation {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }

        .ai-badge {
            background: var(--ot-brand-blue);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .confidence-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: var(--ot-brand-green);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-buy {
            background: var(--ot-brand-green);
            color: white;
        }

        .btn-buy:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(140, 200, 100, 0.4);
        }

        .btn-sell {
            background: var(--ot-brand-red);
            color: white;
        }

        .btn-sell:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(200, 100, 100, 0.4);
        }

        .btn-details {
            background: rgba(255, 255, 255, 0.1);
            color: var(--ot-primary-text);
        }

        /* AI Provenance Marker */
        .ai-generated::after {
            content: '◆';
            font-size: 0.7em;
            margin-left: 4px;
            opacity: 0.6;
            color: var(--ot-brand-blue);
        }

        /* State indicator */
        .state-badge {
            position: absolute;
            top: -8px;
            right: 12px;
            background: var(--ot-brand-blue);
            color: white;
            padding: 2px 10px;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="trading-card" data-state="minimal" onclick="cycleState(this)">
        <span class="state-badge">Click to morph</span>

        <div class="card-header">
            <div class="asset-info">
                <div class="asset-icon">ETH</div>
                <div>
                    <div class="asset-name">Ethereum</div>
                    <div class="asset-symbol">ETH</div>
                </div>
            </div>
            <div class="price-display">
                <div class="price">$3,245.67</div>
                <div class="price-change positive">+2.34%</div>
            </div>
        </div>

        <!-- Expanded Content - Hidden by default -->
        <div class="expanded-content">
            <div class="mini-chart">
                <div class="chart-bar" style="height: 40%"></div>
                <div class="chart-bar" style="height: 55%"></div>
                <div class="chart-bar" style="height: 45%"></div>
                <div class="chart-bar" style="height: 70%"></div>
                <div class="chart-bar" style="height: 60%"></div>
                <div class="chart-bar" style="height: 80%"></div>
                <div class="chart-bar" style="height: 75%"></div>
                <div class="chart-bar" style="height: 90%"></div>
                <div class="chart-bar" style="height: 85%"></div>
                <div class="chart-bar" style="height: 95%"></div>
            </div>

            <div class="metrics-grid">
                <div class="metric">
                    <div class="metric-value">24.5B</div>
                    <div class="metric-label">Volume</div>
                </div>
                <div class="metric">
                    <div class="metric-value">389B</div>
                    <div class="metric-label">Market Cap</div>
                </div>
                <div class="metric">
                    <div class="metric-value">0.72</div>
                    <div class="metric-label">Beta</div>
                </div>
            </div>
        </div>

        <!-- Decision Volume - Hidden by default -->
        <div class="decision-volume">
            <div class="ai-recommendation">
                <span class="ai-badge">AI</span>
                <span class="ai-generated">Strong buy signal detected</span>
            </div>
            <div class="confidence-bar">
                <div class="confidence-fill" style="width: 78%"></div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-buy">Buy</button>
                <button class="btn btn-details">Details</button>
                <button class="btn btn-sell">Sell</button>
            </div>
        </div>
    </div>

    <script>
        const states = ['minimal', 'expanded', 'decision'];
        const stateLabels = {
            minimal: 'Click to morph',
            expanded: 'Click for action',
            decision: 'Click to minimize'
        };

        function cycleState(card) {
            const currentState = card.dataset.state;
            const currentIndex = states.indexOf(currentState);
            const nextIndex = (currentIndex + 1) % states.length;
            const nextState = states[nextIndex];

            card.dataset.state = nextState;
            card.querySelector('.state-badge').textContent = stateLabels[nextState];
        }
    </script>
</body>
</html>
